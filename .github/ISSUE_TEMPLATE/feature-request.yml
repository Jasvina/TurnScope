name: Feature request
description: Suggest a product, architecture, or UX improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What recurring pain point or missing capability are you seeing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Describe the idea, even if incomplete.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or motivating example
      description: Share a run, screenshot, workflow, or runtime where this matters.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - runtime adapters
        - collector
        - schema
        - web UI
        - replay and export
        - docs
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: What success looks like
      description: How would we know this is done well?
