<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1000" fill="#F3EBDD"/>
  <defs>
    <pattern id="microgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#171717" stroke-opacity="0.08" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.8" fill="#171717" fill-opacity="0.12"/>
    </pattern>
    <linearGradient id="signal" x1="242" y1="490" x2="1380" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="0.32" stop-color="#0F766E"/>
      <stop offset="0.66" stop-color="#C2410C"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>
  <rect x="40" y="40" width="1520" height="920" fill="url(#microgrid)"/>
  <rect x="70" y="70" width="1460" height="860" stroke="#111111" stroke-width="6"/>
  <rect x="96" y="96" width="1408" height="808" stroke="#111111" stroke-opacity="0.25" stroke-width="2"/>

  <text x="126" y="168" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" letter-spacing="-5">TurnScope</text>
  <text x="130" y="214" fill="#111111" font-family="Courier New, monospace" font-size="24" letter-spacing="4">LOCAL-FIRST OBSERVABILITY FOR CODING AGENTS</text>
  <text x="1210" y="142" fill="#111111" font-family="Courier New, monospace" font-size="18" text-anchor="end">POSTER / 001</text>
  <text x="1210" y="170" fill="#111111" font-family="Courier New, monospace" font-size="18" text-anchor="end">TRACE THE TURN</text>
  <text x="1210" y="198" fill="#111111" font-family="Courier New, monospace" font-size="18" text-anchor="end">REPLAY THE RUN</text>

  <g transform="translate(128 282)">
    <text x="0" y="0" fill="#111111" font-family="Courier New, monospace" font-size="20">SESSION MAP</text>
    <line x1="0" y1="34" x2="1320" y2="34" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="222" x2="1320" y2="222" stroke="#111111" stroke-opacity="0.2" stroke-width="2"/>
    <line x1="0" y1="410" x2="1320" y2="410" stroke="#111111" stroke-width="3"/>

    <path d="M40 314C160 138 292 382 410 210C520 48 628 362 746 186C870 0 1012 396 1130 192C1214 46 1264 140 1300 96" stroke="url(#signal)" stroke-width="12" stroke-linecap="round"/>

    <g fill="#111111">
      <circle cx="40" cy="314" r="9"/><circle cx="160" cy="138" r="9"/><circle cx="292" cy="382" r="9"/><circle cx="410" cy="210" r="9"/>
      <circle cx="520" cy="48" r="9"/><circle cx="628" cy="362" r="9"/><circle cx="746" cy="186" r="9"/><circle cx="870" cy="0" r="9"/>
      <circle cx="1012" cy="396" r="9"/><circle cx="1130" cy="192" r="9"/><circle cx="1214" cy="46" r="9"/><circle cx="1300" cy="96" r="9"/>
    </g>

    <g font-family="Courier New, monospace" font-size="18" fill="#111111">
      <text x="40" y="348">turn.started</text>
      <text x="160" y="118">tool.called</text>
      <text x="292" y="414">shell.output</text>
      <text x="410" y="244">file.changed</text>
      <text x="520" y="28">approval</text>
      <text x="628" y="394">subagent</text>
      <text x="746" y="220">diff</text>
      <text x="870" y="-20">error</text>
      <text x="1012" y="428">finished</text>
      <text x="1130" y="226">bundle</text>
    </g>

    <g transform="translate(0 472)" font-family="Courier New, monospace" font-size="18" fill="#111111">
      <rect x="0" y="0" width="306" height="92" fill="#DBEAFE" stroke="#111111" stroke-width="2"/>
      <rect x="338" y="0" width="306" height="92" fill="#D1FAE5" stroke="#111111" stroke-width="2"/>
      <rect x="676" y="0" width="306" height="92" fill="#FFEDD5" stroke="#111111" stroke-width="2"/>
      <rect x="1014" y="0" width="306" height="92" fill="#FEE2E2" stroke="#111111" stroke-width="2"/>
      <text x="24" y="38">CODEX ADAPTER</text><text x="24" y="66">JSONL -> EVENTS</text>
      <text x="362" y="38">OPENCLAW</text><text x="362" y="66">SESSIONS -> EVENTS</text>
      <text x="700" y="38">COLLECTOR</text><text x="700" y="66">PACKS + BUNDLES</text>
      <text x="1038" y="38">WEB LENS</text><text x="1038" y="66">FILTER + INSPECT</text>
    </g>
