  <text x="126" y="890" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" letter-spacing="-2">Stop reading terminal scrollback. Start reading the run.</text>
  <text x="126" y="926" fill="#111111" font-family="Courier New, monospace" font-size="19">turns / tools / shell / diff / approval / subagent / replay</text>
  <text x="1474" y="900" fill="#111111" font-family="Courier New, monospace" font-size="20" text-anchor="end">github.com/Jasvina/TurnScope</text>
</svg>
